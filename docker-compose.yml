# Optional dev-only dependencies. The app itself runs natively on the host.
# Use this to spin up PostgreSQL, Redis, and MinIO without installing them.
#
#   docker compose up -d postgres redis minio
#
# Then set in backend/.env:
#   VWA_DATABASE_URL=postgresql+psycopg://vwa:vwa@localhost:5432/vwa
#   VWA_REDIS_URL=redis://localhost:6379/0
#   VWA_STORAGE_BACKEND=minio
#   VWA_MINIO_ACCESS_KEY=vwa VWA_MINIO_SECRET_KEY=vwa
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: vwa
      POSTGRES_PASSWORD: vwa
      POSTGRES_DB: vwa
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: ["miniodata:/data"]

volumes:
  pgdata:
  miniodata:
