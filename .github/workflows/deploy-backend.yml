name: Deploy production stack to EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "workers/**"
      - "ai-models/**"
      - "frontend/**"
      - "Caddyfile"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "docker-compose.local.yml"
      - "scripts/deploy-backend.sh"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-stack-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Rebuild and restart production services
    runs-on: [self-hosted, linux, x64, vwa-production]
    timeout-minutes: 30

    steps:
      - name: Preserve and clear server-side local edits
        working-directory: /home/ubuntu/watermarkai
        run: |
          set -euo pipefail
          # The production host has uncommitted hand-edits to tracked files
          # (Caddyfile, backend/Dockerfile, docker-compose.prod.yml,
          # workers/tasks/detection.py) that block `git pull --ff-only`.
          # Back them up to a timestamped patch AND a git stash (both
          # recoverable) so nothing is lost, then leave a clean tree so the
          # deploy can fast-forward. This is non-destructive: recover with
          #   git stash list / git stash show -p / git apply <patch>
          if ! git diff --quiet || ! git diff --cached --quiet; then
            BACKUP="$HOME/ec2-local-edits-$(date +%Y%m%d-%H%M%S).patch"
            git diff HEAD > "$BACKUP"
            echo "Saved server-side edits to $BACKUP"
            git stash push -u -m "auto-preserved before deploy ${{ github.sha }}"
            echo "Stashed server-side edits (recover with: git stash show -p)"
          else
            echo "Working tree already clean; nothing to preserve."
          fi

      - name: Deploy the pushed commit on EC2
        working-directory: /home/ubuntu/watermarkai
        run: bash scripts/deploy-backend.sh "${{ github.sha }}"
