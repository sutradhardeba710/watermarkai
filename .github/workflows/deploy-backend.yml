name: Deploy production stack to EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "workers/**"
      - "ai-models/**"
      - "frontend/**"
      - "Caddyfile"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "docker-compose.local.yml"
      - "scripts/deploy-backend.sh"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-stack-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Rebuild and restart production services
    runs-on: [self-hosted, linux, x64, vwa-production]
    timeout-minutes: 30

    steps:
      - name: Preserve local state and sync to pushed commit
        working-directory: /home/ubuntu/watermarkai
        run: |
          set -euo pipefail
          # Make the working tree match the pushed commit no matter what local
          # state exists on the host (tracked hand-edits, or a tracked file that
          # the incoming commit deletes — e.g. backend/.env.production, which is
          # now untracked but whose on-disk copy holds the real prod secrets).
          #
          # Strategy: copy the live secrets file OUT of the repo, snapshot any
          # other edits to a timestamped patch, hard-reset to origin, then put
          # the secrets file back. Non-destructive — the patch and the file copy
          # are both recoverable.
          STAMP="$(date +%Y%m%d-%H%M%S)"
          LIVE_ENV="$HOME/vwa-env-production.live"

          if [[ -f backend/.env.production ]]; then
            cp backend/.env.production "$LIVE_ENV"
            echo "Saved live secrets to $LIVE_ENV"
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git diff HEAD > "$HOME/ec2-local-edits-$STAMP.patch" || true
            echo "Saved server-side edits to $HOME/ec2-local-edits-$STAMP.patch"
          fi

          git fetch --prune origin
          git reset --hard origin/main
          echo "Working tree hard-reset to $(git rev-parse --short HEAD)"

          # Restore the live secrets file (git-ignored, so it stays put after).
          if [[ -f "$LIVE_ENV" ]]; then
            cp "$LIVE_ENV" backend/.env.production
            echo "Restored live secrets to backend/.env.production"
          fi

      - name: Deploy the pushed commit on EC2
        working-directory: /home/ubuntu/watermarkai
        run: bash scripts/deploy-backend.sh "${{ github.sha }}"
